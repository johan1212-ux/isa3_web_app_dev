<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restify Rooms</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>

        .rooms{
            width: 85%;
            margin: 40px auto;
            text-align: center;
        }

        .rooms h2{
            margin-bottom: 25px;
            color:grey;
        }

        .room-comtainer
        {
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
            gap: 20px;
        }




        .room-card
        {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow:0 4px 10px rgba(0,0,0,0.3) ;
            transition: 0.3s;
        }



        .room-card img{
        width:100%;
        height:180px;
        object-fit:cover;
        }

        .room-info{
        padding:15px;
        }

        .room-info h3{
        margin-bottom:10px;
        }

        .room-price{
        font-weight:bold;
        color:#e74c3c;
        }

        button {
        width: 20%;
        padding: 12px;
        background: rgb(255, 0, 0);
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }









      footer {
        background: rgb(37, 37, 39);
        color: white;
        text-align: center;
        padding: 15px;
        margin-top: 30px;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="home.html"><h2>Restify Stay</h2></a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNavAltMarkup"
          aria-controls="navbarNavAltMarkup"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
          <div class="navbar-nav">
            <a class="nav-link active" aria-current="page" href="home.html"
              >Home</a
            >
            <a class="nav-link" href="rooms.html">Rooms</a>
            <a class="nav-link" href="index.html">Boking</a>
            <a class="nav-link" href="contact.html">Contact</a>
          </div>
        </div>
      </div>
    </nav>

    <div class="rooms">
        <h2> Your Rooms To Stay</h2>>

        <div class="room-container"> </div>
        <div class="room-card">
            <img src="images/pexels-pixabay-271619.jpg">
            <div class="room-info">
                <h3>Single Room</h3>
                <p class="room-price">1500/night</p>
                <button><a href="index.html" target="_self">Book Room</a></button>
            </div>
        </div>


        <div class="room-card">
            <img src="images/pexels-wewe-yang-2383099-4063401.jpg">
            <div class="room-info">
                <h3>Dloube Room</h3>
                <p class="room-price">1500/night</p>
                <button><a href="index.html" target="_self">Book Room</a></button>
            </div>
        </div>


        <div class="room-card">
            <img src="images/pexels-pixabay-237371.jpg">
            <div class="room-info">
                <h3>Dulex Room</h3>
                <p class="room-price">6000/night</p>
                <button><a href="index.html" target="_self">Book Room</a></button>
            </div>
        </div>

        <div class="room-card">
            <img src="images/pexels-wewe-yang-2383099-4063401.jpg">
            <div class="room-info">
                <h3>suite</h3> Room</h3>
                <p class="room-price">10000/night</p>
                <button><a href="index.html" target="_self">Book Room</a></button>
            </div>
        </div>


    </div>



    <footer>© 2026 RestifyStay Hotel | All Rights Reserved</footer>
  </body>
</html>

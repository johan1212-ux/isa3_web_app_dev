<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restify Hotel Booking</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: whitesmoke;
      }

      .title {
        height: 90vh;
        background: url("images/background.jpg") no-repeat center;
        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
      }

      .title h2 {
        font-size: 90px;
        margin-bottom: 50px;
        color: rgb(207, 207, 207);
      }

      .title button {
        padding: 12px 25px;
        background: yellow;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      .booking {
        background: white;
        width: 80%;
        margin: -60px auto 40px;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgb(60, 58, 58);
      }

      .booking h3 {
        text-align: center;
        margin-bottom: 20px;
      }

      .form-group {
        display: flex;
        gap: 20px;
        margin-bottom: 15px;
      }

      .form-group input,
      .form-group select {
        flex: 1;
        padding: 10px;
        border: 1px solid silver;
        border-radius: 5px;
      }

      .booking button {
        width: 100%;
        padding: 12px;
        background: gray;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      .booking button:hover {
        background: rgb(255, 89, 0);
        border-radius: 5px;
      }

      footer {
        background: rgb(37, 37, 39);
        color: white;
        text-align: center;
        padding: 15px;
        margin-top: 30px;
      }

      .price {
        font-size: 20px;
        font-weight: bold;
        text-align: center;
        margin: 15px 0;
        color: #2c3e50;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="home.html"><h2>Restify Stay</h2></a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNavAltMarkup"
          aria-controls="navbarNavAltMarkup"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
          <div class="navbar-nav">
            <a class="nav-link active" aria-current="page" href="home.html"
              >Home</a
            >
            <a class="nav-link" href="rooms.html">Rooms</a>
            <a class="nav-link" href="index.html">Boking</a>
          </div>
        </div>
      </div>
    </nav>

    <section class="title">
      <div>
        <h2>Book Your Dream Stay</h2>
        <button><a href="rooms.html" target="_self">Explore Rooms</a></button>
      </div>
    </section>

    <section class="booking">
      <h3>Book a Room</h3>

      <form id="bookingform" action="booking.php" method="post">
        <div class="form-group">
          <input
            type="text"
            name="full_name"
            placeholder="Full Name"
            required
          />
          <input type="email" name="email" placeholder="Email-Id" required />
        </div>

        <div class="form-group">
          in<input type="date" id="checkin" name="checkin" required /> out<input
            type="date"
            id="checkout"
            name="checkout"
            required
          />
        </div>

        <div class="form-group">
          <input
            type="number"
            name="rooms"
            id="rooms"
            placeholder="Rooms"
            value="1"
          />
          <input type="text" name="phone" placeholder="Phone Number" />
        </div>

        <div class="form-group">
          <select id="roomtype" name="roomtype">
            <option value="">Select Room Type</option>
            <option value="1500">Single Room(1500)</option>
            <option value="3000">Double Room (3000)</option>
            <option value="6000">Deluxe Room (6000)</option>
            <option value="10000">Suite (10000)</option>
          </select>
        </div>

        <div class="price">Total Price:<span id="totalPrice">0</span></div>
        <input type="hidden" name="totalprice" id="totalprice" />
        <button type="submit">Book Now</button>
      </form>
    </section>
    <footer>© 2026 RestifyStay Hotel | All Rights Reserved</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document
        .getElementById("bookingform")
        .addEventListener("change", calculatePrice);

      function calculatePrice() {
        let room_price = parseInt(document.getElementById("roomtype").value);

        let checkin = new Date(document.getElementById("checkin").value);
        let checkout = new Date(document.getElementById("checkout").value);

        let rooms = document.getElementById("rooms").value || 1;

        if (room_price && checkin && checkout) {
          let diff = checkout - checkin;
          let days = diff / (1000 * 60 * 60 * 24);

          if (days > 0) {
            let total = days * room_price * rooms;
            document.getElementById("totalPrice").innerText = total;
          }
        }
      }
    </script>
  </body>
</html>
